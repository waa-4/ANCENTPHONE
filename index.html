<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AncentPhone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <section class="phone-shell" id="phoneShell">
      <div class="crack crack-a"></div>
      <div class="crack crack-b"></div>
      <div class="scarab">𓆣</div>

      <section class="screen" id="screen">
        <div class="sand-layer"></div>
        <div class="sun-orb"></div>

        <header class="status-bar">
          <span id="statusTime">9:41</span>
          <div class="status-right">
            <span id="pageText">I</span>
            <span>𓂀</span>
            <span id="batteryText">88%</span>
          </div>
        </header>

        <section class="view lock-view active" id="lockView">
          <div class="lock-art">
            <div class="glyph-ring">𓂀</div>
            <div class="lock-date" id="lockDate">Monday, June 9</div>
            <div class="lock-time" id="lockTime">9:41</div>
            <p>The ancient slab sleeps beneath the sand.</p>
          </div>
          <button class="stone-button" id="unlockBtn">Awaken</button>
        </section>

        <section class="view home-view" id="homeView">
          <div class="top-widget">
            <div>
              <strong id="phoneTitle">AncentPhone</strong>
              <span id="phoneSubtitle">Sand-powered rectangle</span>
            </div>
            <button class="small-stone" id="editToggle">Edit</button>
          </div>

          <div class="pages" id="pages"></div>

          <div class="page-dots" id="pageDots"></div>

          <nav class="dock" id="dock"></nav>
        </section>

        <section class="view app-view" id="appView">
          <header class="app-header">
            <button class="round-stone" id="backBtn">‹</button>
            <div>
              <strong id="appTitle">App</strong>
              <span id="appDesc">Ancient application</span>
            </div>
          </header>
          <div class="app-content" id="appContent"></div>
        </section>

        <aside class="shade" id="shade">
          <div class="shade-handle"></div>
          <h2>Tablet Log</h2>
          <div id="notificationList"></div>
          <div class="quick-actions">
            <button id="quickTheme">Theme</button>
            <button id="quickSand">Sandstorm</button>
            <button id="quickLock">Sleep</button>
          </div>
        </aside>
      </section>

      <button class="side side-left" id="shadeBtn" title="Tablet Log"></button>
      <button class="side side-right" id="lockBtn" title="Lock"></button>
    </section>

    <section class="helper-panel">
      <h1>AncentPhone</h1>
      <p>Edit apps in <code>config.js</code>, drag icons while in Edit mode, create apps in Debug, and organize folders.</p>
      <div class="helper-actions">
        <button id="resetLayout">Reset layout</button>
        <button id="openDebug">Open Debug</button>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
